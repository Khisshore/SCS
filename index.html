<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCS - Student Collection System</title>
  <meta name="description" content="Professional offline-first student collection management system">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- CSP is managed dynamically by electron/main.js onHeadersReceived handler.
       Do NOT add a <meta> CSP tag here — it conflicts with the dynamic policy and
       blocks inline scripts in production builds. -->
  <!-- Fast Theme Initialization to prevent cursor delay / FOUC -->
  <style>
    html { color-scheme: light; }
    html[data-theme="dark"] { color-scheme: dark; }
  </style>
  <!-- Theme init is an external script to comply with CSP script-src 'self' -->
  <script type="module" src="src/theme-init.js"></script>
  <link rel="stylesheet" href="src/styles/index.css">
</head>
<body>
  <!-- ═══ SPLASH SCREEN — renders instantly before JS bundle ═══ -->
  <div id="splash-screen" style="
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    background-color: #000000;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 99999;
    transition: opacity 0.6s ease-out;
  ">
    <img src="src/assets/logos/scs-logo.png" alt="SCS" style="
      width: 120px; height: auto;
      animation: splashPulse 2s ease-in-out infinite;
    ">
  </div>
  <style>
    @keyframes splashPulse {
      0%   { opacity: 0.4; transform: scale(0.92); }
      50%  { opacity: 1;   transform: scale(1);    }
      100% { opacity: 0.4; transform: scale(0.92); }
    }
    #splash-screen.fade-out {
      opacity: 0 !important;
      pointer-events: none;
    }
  </style>

  <!-- Background Island (Managed by React) -->
  <div id="bg-island-container" style="position: fixed; inset: 0; z-index: -50; pointer-events: none; opacity: 0; transition: opacity 1.5s ease;"></div>

  <!-- Application Container -->
  <div class="app-container">
    <!-- Sidebar Navigation -->
    <aside class="sidebar" id="sidebar">
      <!-- Logo & Header -->
      <div class="sidebar-header">
        <a href="#dashboard" class="logo" title="SCS Dashboard">
          <div class="logo-icon">
            <img src="src/assets/logos/scs-logo.png" alt="SCS Logo" class="main-logo-img">
          </div>
        </a>
      </div>

      <div class="nav-divider"></div>

      <!-- Navigation Menu -->
      <div class="sidebar-nav">
        <div class="nav-group-top">
          <a href="#dashboard" class="nav-link active" data-page="dashboard" title="Dashboard">
            <span class="nav-icon">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                <polyline points="9 22 9 12 15 12 15 22" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
          </a>
          <a href="#students" class="nav-link" data-page="students" title="Students">
            <span class="nav-icon">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="9" cy="7" r="4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
          </a>
          <a href="#spreadsheet" class="nav-link" data-page="spreadsheet" title="Spreadsheet">
            <span class="nav-icon">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M3 3h18v18H3V3z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M3 9h18M3 15h18M9 3v18m6-18v18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
          </a>
          <a href="#reports" class="nav-link" data-page="reports" title="Reports">
            <span class="nav-icon">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                <polyline points="14 2 14 8 20 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M16 13H8M16 17H8M10 9H8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
          </a>
        </div>

        <div class="nav-divider"></div>

        <div class="nav-group-bottom">
          <a href="#settings" class="nav-link" data-page="settings" title="Settings">
            <span class="nav-icon">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
          </a>
        </div>
      </div>
    </aside>

    <!-- Main Content Area -->
    <main class="main-content">
      <div class="content-wrapper">
        <!-- Dynamic content will be loaded here -->
        <div id="app-content"></div>
      </div>
    </main>
  </div>

  <!-- Modal Container -->
  <div id="modal-container"></div>

  <!-- AI Chat Assistant Container -->
  <div id="aiChatRoot"></div>

  <!-- Loading Overlay -->
  <div id="loading-overlay" class="loading-overlay hidden">
    <div class="spinner"></div>
  </div>

  <script type="module" src="src/main.js"></script>

  <!-- Branded SVG Gradients -->
  <svg width="0" height="0" style="position: absolute;">
    <defs>
      <linearGradient id="scs-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#06b6d4; stop-opacity:1" />
        <stop offset="100%" style="stop-color:#3b82f6; stop-opacity:1" />
      </linearGradient>
    </defs>
  </svg>
  <!-- Debug log removed — inline scripts violate CSP script-src 'self' in production -->
</body>
</html>
