<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset SCS Onboarding</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      margin: 0;
    }
    .container {
      background: white;
      padding: 3rem;
      border-radius: 1rem;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
      text-align: center;
      max-width: 400px;
    }
    h1 { color: #333; margin-bottom: 1rem; }
    p { color: #666; margin-bottom: 2rem; }
    button {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      padding: 1rem 2rem;
      border-radius: 0.5rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }
    button:hover { transform: scale(1.05); }
    .success {
      background: #10b981;
      color: white;
      padding: 1rem;
      border-radius: 0.5rem;
      margin-top: 1rem;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Reset Onboarding</h1>
    <p>Click the button below to reset the first-run setup wizard. You'll see it again when you reload the app.</p>
    <button onclick="resetOnboarding()">Reset Setup Wizard</button>
    <div class="success" id="success">✓ Reset successful! Close this and reload SCS.</div>
  </div>

  <script>
    async function resetOnboarding() {
      const dbName = 'SCSDB';
      const request = indexedDB.open(dbName);
      
      request.onsuccess = function(event) {
        const db = event.target.result;
        const transaction = db.transaction(['settings'], 'readwrite');
        const store = transaction.objectStore('settings');
        
        store.delete('firstRunCompleted');
        store.delete('baseFolder');
        
        transaction.oncomplete = function() {
          document.getElementById('success').style.display = 'block';
        };
      };
    }
  </script>
</body>
</html>
