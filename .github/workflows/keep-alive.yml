name: SCS Supabase Keep-Alive

on:
  schedule:
    # Every day at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Database
        run: |
          # Use both prefixed and non-prefixed secrets for maximum compatibility
          URL="${{ secrets.VITE_SUPABASE_URL || secrets.SUPABASE_URL }}"
          KEY="${{ secrets.VITE_SUPABASE_ANON_KEY || secrets.SUPABASE_ANON_KEY }}"
          
          if [ -z "$URL" ]; then
            echo "Error: Supabase URL secret is missing."
            exit 1
          fi
          
          echo "Pinging Supabase REST API at $URL..."
          curl -f -i -X GET "$URL/rest/v1/settings?select=key&limit=1" \
          -H "apikey: $KEY" \
          -H "Authorization: Bearer $KEY"
